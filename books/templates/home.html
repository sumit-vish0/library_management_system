{% extends 'base.html' %}
{% load static %} {% block title %}Home Page{% endblock title %}
{% block content %}

<style>
  .HEADING {
    font-family: "Gill Sans", "Gill Sans MT", Calibri, sans-serif;
    text-align: center;
    background-color: lightblue;
    padding: 10px 0;
    margin-bottom: 30px;
  }
  .book-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 25px;
    padding: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .book-card {
    display: flex;
    flex-direction: column;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    overflow: hidden;
    text-decoration: none;
    color: #333;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .book-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 12px rgba(0, 0, 0, 0.1);
  }
  .book-card img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    background-color: #f5f5f5;
  }
  .book-title {
    padding: 12px;
    font-size: 1rem;
    font-weight: 600;
    text-align: center;
    font-family: sans-serif;
  }
</style>

<div class="HEADING">
  <h1>LIBRARY MANAGEMENT SYSTEM</h1>
</div>

<div class="main-container">
  {% if message %}
  <div class="message-container">
    <p style="color: red; font-size: 30px; font-weight: bolder; text-align: center;">{{ message }}</p>
  </div>
  {% endif %}

  <div class="book-grid">
    {% for book in books %}
    <a href="{% url 'details' book.id %}" class="book-card">
      
      <img src="{% static 'image/book_' %}{{ book.id }}.jpg" alt="{{ book.title }}">
      
      <div class="book-title">{{ book.title }}</div>
    </a>
    {% endfor %}
  </div>
</div>

{% endblock content %}
